<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConta SV | Sistema Contable El Salvador</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <meta name="description"
        content="EduConta SV: Herramienta contable profesional para El Salvador. Gestión de libros, estados financieros y normativas para Banca, Comercio, Gobierno y Agro.">
    <meta name="keywords"
        content="contabilidad El Salvador, EduConta SV, libros contables, NIC 41, SAFI, SSF, balance general">
    <meta name="robots" content="index, follow">

    <!-- Preconnect hints -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://opteohbpsbrjnblexkqo.supabase.co">

    <link href="css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="pt-24 pb-12 relative">

    <!-- CONTENEDOR RAIZ COMPARTIDO: Header y Modales -->
    <div id="shared-components-root"></div>

    <!-- PANTALLA 1: INICIO -->
    <main id="home-screen" class="max-w-5xl mx-auto px-6 md:px-8 mt-6 md:mt-12 no-print fade-in">
        <div class="mb-10 md:mb-16">
            <h2 class="text-4xl md:text-6xl font-extrabold text-slate-900 tracking-tight leading-tight">Gestor Maestro
                <br /><span class="text-sky-500">Multisectorial.</span>
            </h2>
            <p class="text-slate-500 mt-4 md:mt-6 text-base md:text-xl font-medium max-w-xl">Sistema contable con
                catálogos integrales para El Salvador (Banca, Comercio, Gobierno y Agro).</p>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Botón a Proyectos -->
            <button onclick="window.location.href='proyectos.html'"
                class="glass-card bg-white p-8 text-left hover:bg-slate-50 hover:border-sky-400 focus:outline-none focus:ring-4 focus:ring-sky-100/50 transition-all group">
                <i class="fas fa-folder-open text-4xl text-sky-500 mb-4 group-hover:scale-110 transition-transform"></i>
                <h3 class="text-lg font-bold text-slate-800">Proyectos Contables</h3>
                <p class="text-xs text-slate-400 mt-2">Crea y gestiona múltiples libros independientes por empresa o
                    cliente.</p>
            </button>

            <!-- Botón a Catálogos Completos -->
            <button onclick="window.location.href='catalogo.html'"
                class="glass-card bg-white p-8 text-left hover:bg-slate-50 hover:border-indigo-400 focus:outline-none focus:ring-4 focus:ring-indigo-100/50 transition-all group">
                <i class="fas fa-book text-4xl text-indigo-500 mb-4 group-hover:scale-110 transition-transform"></i>
                <h3 class="text-lg font-bold text-slate-800">Catálogos de Cuentas</h3>
                <p class="text-xs text-slate-400 mt-2">Consulta los catálogos integrales (NIC 2, NIC 41, Banca y
                    Gubernamental).</p>
            </button>

            <!-- Botón a Biblioteca Legal -->
            <button onclick="window.location.href='biblioteca.html'"
                class="glass-card bg-white p-8 text-left hover:bg-slate-50 hover:border-emerald-400 focus:outline-none focus:ring-4 focus:ring-emerald-100/50 transition-all group">
                <i
                    class="fas fa-balance-scale text-4xl text-emerald-500 mb-4 group-hover:scale-110 transition-transform"></i>
                <h3 class="text-lg font-bold text-slate-800">Biblioteca Legal</h3>
                <p class="text-xs text-slate-400 mt-2">Acceso a leyes de bancos, seguros, NIC, NIIF, leyes aduaneras y
                    más.</p>
            </button>
        </div>
    </main>

    <!-- CORE MODULES -->
    <script defer src="js/core/supabase.js"></script>
    <script defer src="js/core/auth.js"></script>
    <script defer src="js/core/components.js"></script>

    <script>
        // Inicializar UI compartida (Header principal, Navigations, Modal de UI Global)
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.injectSharedUI === 'function') {
                window.injectSharedUI('shared-components-root');
            }
        });
    </script>
</body>

</html>
