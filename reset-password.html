<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | EduConta SV</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Tarjeta Estructurada con el Diseño de Educonta (Glassmorphism de Modales) -->
    <main class="glass-modal w-full max-w-[420px] relative z-10" style="animation: modalPopIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
        
        <div class="mx-auto w-20 h-20 rounded-[36px] bg-white mb-8 flex items-center justify-center"
            style="box-shadow: -8px -8px 16px rgba(255,255,255,0.9), 8px 8px 16px rgba(15, 23, 42, 0.06); transform: translateY(-10px);">
            <i class="fas fa-lock text-3xl text-sky-500"></i>
        </div>

        <h4 class="text-2xl font-black text-slate-800 tracking-tight mb-2 text-center"
            style="text-shadow: 1px 1px 0px rgba(255,255,255,1);">Restablecer Contraseña</h4>
        <p class="text-xs text-slate-400 text-center font-bold uppercase tracking-widest mb-8">Escribe tu nueva clave de acceso</p>

        <!-- Zonas de Alerta -->
        <div id="reset-error-msg"
            class="hidden mb-6 p-4 bg-rose-50 border-none rounded-[36px] text-rose-600 text-xs font-bold shadow-[inset_2px_2px_5px_rgba(225,29,72,0.1)]">
        </div>
        <div id="reset-success-msg"
            class="hidden mb-6 p-4 bg-emerald-50 border-none rounded-[36px] text-emerald-600 text-xs font-bold text-center shadow-[inset_2px_2px_5px_rgba(16,185,129,0.1)]">
        </div>

        <!-- Formulario Principal -->
        <form id="form-reset-pwd" class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1 px-2">Nueva Contraseña</label>
                <div class="relative">
                    <input type="password" id="reset-password-input" required minlength="6"
                        class="w-full bg-slate-50 border border-slate-200 rounded-[36px] px-5 py-3.5 text-sm text-slate-700 font-bold focus:border-sky-400 focus:bg-white outline-none transition-all pr-12"
                        placeholder="Mínimo 6 caracteres">
                    <button type="button"
                        onclick="toggleVisibility()"
                        class="absolute right-5 top-3.5 text-slate-400 hover:text-sky-500 transition-colors focus:outline-none">
                        <i id="reset-password-icon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mt-8 flex flex-col gap-4">
                <button type="submit" id="btn-reset-submit"
                    class="w-full px-6 py-4 rounded-[36px] bg-sky-500 text-white font-black text-[13px] uppercase tracking-wide transition-all shadow-lg shadow-sky-100 hover:bg-sky-600 focus:ring-4 focus:ring-sky-100/50 outline-none">
                    Guardar Contraseña
                </button>
                <button type="button" onclick="window.location.href='index.html'"
                    class="text-[11px] font-bold text-slate-500 hover:text-slate-800 transition-colors py-2 focus:outline-none">
                    Cancelar y volver al <span class="text-sky-500">Inicio</span>
                </button>
            </div>
        </form>
    </main>

    <!-- CORE DEPENDENCIES -->
    <script defer src="js/core/supabase.js"></script>
    <script defer src="js/pages/reset-password.js"></script>
</body>

</html>
